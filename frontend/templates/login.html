<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DualStack Radar</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/base.css">
  <link rel="stylesheet" href="../static/css/animations.css">
  <link rel="stylesheet" href="../static/css/auth.css">
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="auth-shell">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon" style="background:none;">
          <img src="../static/logo.png" alt="DualStack" style="width:40px;height:40px;object-fit:contain;">
        </div>
        <div class="auth-logo-text"><b>DualStack</b></div>
      </div>

      <!-- Badge de status -->
      <div class="auth-badge">
        <span class="dot-sm"></span>
        Sistema online
      </div>

      <!-- Título -->
      <div class="auth-title">Bem-vindo de <span>volta</span></div>
      <div class="auth-subtitle">Acesse o painel de leads da DualStack</div>

      <!-- Formulário -->
      <form class="auth-form" onsubmit="entrar(event)">

        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="voce@email.com"
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
          >
        </div>

        <button class="btn-auth" type="submit">
          <span>Entrar no Radar</span>
        </button>

      </form>

      <!-- Rodapé -->
      <div class="auth-footer">
        Não tem conta? <a href="/register">Criar conta</a>
      </div>

    </div>
  </div>

  <script src="../static/js/canvas.js"></script>
  <script>
    function entrar(e) {
      e.preventDefault();
      window.location.href = '/plans';
    }
  </script>

</body>
</html>
