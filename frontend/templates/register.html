<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — DualStack Radar</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/base.css">
  <link rel="stylesheet" href="../static/css/animations.css">
  <link rel="stylesheet" href="../static/css/auth.css">
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="auth-shell">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon" style="background:none;">
          <img src="../static/logo.png" alt="DualStack" style="width:40px;height:40px;object-fit:contain;">
        </div>
        <div class="auth-logo-text"><b>DualStack</b></div>
      </div>

      <!-- Badge de status -->
      <div class="auth-badge">
        <span class="dot-sm"></span>
        Sistema online
      </div>

      <!-- Título -->
      <div class="auth-title">Criar <span>conta</span></div>
      <div class="auth-subtitle">Junte-se ao radar de leads da DualStack</div>

      <!-- Formulário -->
      <form class="auth-form" onsubmit="return false">

        <div class="form-group">
          <label class="form-label" for="name">Nome completo</label>
          <input
            class="form-input"
            type="text"
            id="name"
            name="name"
            placeholder="João Victor"
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="voce@email.com"
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirmar senha</label>
          <input
            class="form-input"
            type="password"
            id="confirm"
            name="confirm"
            placeholder="Repita a senha"
            autocomplete="new-password"
          >
        </div>

        <button class="btn-auth" type="submit">
          <span>Criar conta</span>
        </button>

      </form>

      <!-- Rodapé -->
      <div class="auth-footer">
        Já tem conta? <a href="/login">Entrar</a>
      </div>

    </div>
  </div>

  <script src="../static/js/canvas.js"></script>

</body>
</html>
